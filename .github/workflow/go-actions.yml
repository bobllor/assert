name: go-actions

on:
  workflow_dispatch:
  push:
    branches:
      - 'releases/**'
      - 'dev/**'
    paths:
      - '**.go'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'

jobs:
  main:
    name: Go testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.24'
      - name: Go test
        run: go test ./...